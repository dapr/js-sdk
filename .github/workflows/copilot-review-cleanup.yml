# Runs hourly and closes any open mirror PRs (branches matching copilot/pr-*)
# that were created more than 3 hours ago. Also deletes the mirror branch and
# posts a cleanup notice on the original PR.

name: copilot-review-cleanup

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch: {}   # Allow manual trigger for testing

jobs:
  cleanup:
    name: cleanup-mirror-prs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Clean up stale Copilot review mirror PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DAPR_BOT_TOKEN }}
          script: |
            const script = require('./.github/scripts/copilot_review_cleanup.js')
            await script({ github, context })
