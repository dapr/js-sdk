# Listens for Copilot review activity on mirror PRs (branches matching copilot/pr-*)
# and copies the review content back to the original PR with attribution.
# Handles three event types:
#   - pull_request_review:         review summary/body submitted by Copilot
#   - pull_request_review_comment: inline code comment from Copilot
#   - issue_comment:               regular (non-review) comment from Copilot on the mirror PR

name: copilot-review-copyback

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  copyback:
    name: copy-copilot-review
    runs-on: ubuntu-latest
    steps:
      # Always check out main so the scripts are available regardless of which
      # commit the mirror PR's head points at (which may be a fork's commit).
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy Copilot review to original PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DAPR_BOT_TOKEN }}
          script: |
            const script = require('./.github/scripts/copilot_review_copyback.js')
            await script({ github, context })
