# Triggered when a maintainer posts a PR comment starting with "review:" (case-insensitive).
# The workflow mirrors the fork PR into a repo-local branch, opens a mirror PR,
# requests Copilot as a reviewer, and posts the maintainer's review text as a comment
# directed at @copilot. Results are copied back to the original PR by copilot-review-copyback.yml.

name: copilot-review-request

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  request-review:
    name: request-copilot-review
    runs-on: ubuntu-latest
    # Only run for PR comments; issue comments are handled by dapr-bot.yml
    if: github.event.issue.pull_request != null
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DAPR_BOT_TOKEN }}
          script: |
            const script = require('./.github/scripts/copilot_review_request.js')
            await script({ github, context })
